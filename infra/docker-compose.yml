services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: aerosentinel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  risk-service:
    build:
      context: ../risk-service
    ports:
      - "8010:8010"

  graphdb:
    image: ontotext/graphdb:10.8.4
    ports:
      - "7200:7200"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/or-atm-realm.json:/opt/keycloak/data/import/or-atm-realm.json:ro
    ports:
      - "8081:8080"

  ne-one-server:
    image: git.openlogisticsfoundation.org:5050/wg-digitalaircargo/ne-one:latest
    depends_on:
      - keycloak
    environment:
      LO_ID_CONFIG_HOST: localhost
      LO_ID_CONFIG_SCHEME: http
      LO_ID_CONFIG_PORT: 8080
      LO_ID_CONFIG_ROOT_PATH: /
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8081/realms/or-atm
      QUARKUS_OIDC_CLIENT_ID: ne-one
      QUARKUS_OIDC_CLIENT_SECRET: ne-one-secret
    ports:
      - "8080:8080"

  backend:
    build:
      context: ../backend
    environment:
      PORT: 3000
      MQTT_URL: mqtt://mqtt-broker:1883
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/aerosentinel
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/or-atm
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/or-atm/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: or-atm-api
      ONE_RECORD_BASE_URL: http://ne-one-server:8080
      RISK_SERVICE_URL: http://risk-service:8010
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      - mqtt-broker
      - redis
      - postgres
      - risk-service
      - keycloak
      - ne-one-server
      - mailhog
    ports:
      - "3000:3000"

  simulator:
    build:
      context: ../simulator
    environment:
      MQTT_URL: mqtt://mqtt-broker:1883
      BACKEND_URL: http://backend:3000
      PUBLISH_INTERVAL_MS: 300000
      CARGO_PUBLISH_INTERVAL_MS: 45000
      ULD_IDS: JTN-7890,JTN-8972,JTN-4421
      CARGO_IDS: AWB-78492,AWB-55110,AWB-11204
      DEVIATION_PROBABILITY: 0.25
      SCENARIO: heatwave
    depends_on:
      - mqtt-broker
      - backend

  frontend:
    build:
      context: ../frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3001:3000"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"
      - "1025:1025"
